# Informações

# spring.jpa.hibernate.ddl-auto=
# none: Banco de dados e tabelas devem ser criados com antecedência
# update: Banco de dados deve ser criado com antecedência, tabelas podem ser criandas com antecedência, entretanto,
#         as tabelas serão atualizadas pelo código JPA ( model )
# create-drop: Banco de dados deve ser criado com antecedência, as tabelas são criadas automaticamente pelo código (model),
#              entretanto, as tabelas serão excluidas toda vez que o servidor é "interrompido"
# create: Banco de dados deve ser criado com antecedência, quando o servidor carrega as tabelas são recriadas, entretanto,
#         quando o servidor é interrompido as tabelas permanecem